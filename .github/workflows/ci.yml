name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  pull-requests: write

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test

      - name: Report test and coverage summary on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require("node:fs");
            const marker = "<!-- coverage-report -->";
            const path = "coverage/coverage-summary.json";

            let summary;
            try {
              if (!fs.existsSync(path)) {
                core.setFailed(`Coverage summary file not found at ${path}`);
                return;
              }
              summary = JSON.parse(fs.readFileSync(path, "utf8"));
            } catch (error) {
              core.setFailed(`Failed to read coverage summary: ${error.message}`);
              return;
            }
            const total = summary.total;
            const fmt = (metric) =>
              `${metric.pct}% (${metric.covered}/${metric.total})`;

            const body = [
              marker,
              "## ✅ CI Test Report",
              "Tests and build checks passed for this run.",
              "",
              "### Coverage",
              `- Statements: ${fmt(total.statements)}`,
              `- Branches: ${fmt(total.branches)}`,
              `- Functions: ${fmt(total.functions)}`,
              `- Lines: ${fmt(total.lines)}`,
            ].join("\n");

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(
              (comment) =>
                comment.user?.type === "Bot" && comment.body?.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Build site
        run: npm run build
